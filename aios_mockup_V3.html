<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFLY AIOS V3 - 数字员工</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        [x-cloak] { display: none !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.2s ease-out; }
        @keyframes dispatch-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .dispatch-pulse { animation: dispatch-pulse 1.5s ease-in-out infinite; }
        .typing-cursor::after { content: '|'; animation: blink 1s step-start infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        button:focus-visible, [role="button"]:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
        button, [role="button"] { touch-action: manipulation; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; }
        .tag-red { background: #fef2f2; color: #dc2626; }
        .tag-green { background: #f0fdf4; color: #16a34a; }
        .tag-yellow { background: #fffbeb; color: #d97706; }
        .tag-blue { background: #eff6ff; color: #2563eb; }
        .tag-gray { background: #f8fafc; color: #64748b; }
        .tag-purple { background: #faf5ff; color: #7c3aed; }
        input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #e2e8f0; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #2563eb; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 font-sans antialiased h-screen flex overflow-hidden"
      x-data="appData()"
      x-effect="$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); })">

<!-- ===== SIDEBAR ===== -->
<aside class="bg-white border-r border-gray-200 flex flex-col transition-[width] duration-300 h-full relative z-10 flex-shrink-0"
       :class="sidebarOpen ? 'w-64' : 'w-16'">

    <!-- 品牌区 -->
    <div class="h-14 flex-shrink-0 flex items-center px-3 gap-2 border-b border-gray-100"
         :class="sidebarOpen ? 'justify-between' : 'justify-center'">
        <div class="flex items-center min-w-0 gap-2" x-show="sidebarOpen">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold flex-shrink-0 shadow-sm text-xs">AI</div>
            <span class="font-semibold text-lg text-slate-800 tracking-tight truncate">IFLY AIOS</span>
        </div>
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold flex-shrink-0 shadow-sm text-xs" x-show="!sidebarOpen">AI</div>
        <button type="button" @click="sidebarOpen = !sidebarOpen" aria-label="展开或收起侧边栏"
                class="flex-shrink-0 p-1.5 text-slate-500 hover:text-slate-700 hover:bg-gray-100 rounded-lg transition-colors"
                x-show="sidebarOpen">
            <i data-lucide="panel-left" class="w-5 h-5" aria-hidden="true"></i>
        </button>
    </div>

    <!-- 导航 + 员工列表 -->
    <nav class="flex-1 flex flex-col min-h-0 overflow-hidden">

        <!-- 员工区块 -->
        <div class="flex-1 flex flex-col min-h-0 overflow-hidden">
            <!-- 员工区标题行 -->
            <div class="flex items-center justify-between px-3 pt-3 pb-1 flex-shrink-0">
                <span x-show="sidebarOpen" class="text-xs font-semibold text-slate-400 uppercase tracking-wider">我的员工</span>
                <i x-show="!sidebarOpen" data-lucide="users" class="w-4 h-4 text-slate-400 mx-auto" aria-hidden="true"></i>
                <!-- 新增员工按钮（展开时显示在标题右侧） -->
                <button type="button" x-show="sidebarOpen"
                        @click="showCreateModal = true; createStep = 1; createForm = { name: '', avatar: '🤖', iconBg: 'bg-blue-100', model: 'spark-4', requirements: '', skills: [] }"
                    <i data-lucide="plus" class="w-4 h-4" aria-hidden="true"></i>
                </button>
            </div>

            <!-- 搜索框（展开时显示） -->
            <div class="px-3 pb-2 flex-shrink-0" x-show="sidebarOpen">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400 pointer-events-none"></i>
                    <input type="search" x-model="employeeSearch" placeholder="搜索员工…"
                           class="w-full pl-7 pr-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-gray-50">
                </div>
            </div>

            <!-- 员工列表（可滚动） -->
            <div class="flex-1 overflow-y-auto px-2 pb-2">
                <!-- 默认员工（置顶） -->
                <template x-for="emp in employeeList.filter(e => e.type === 'default')" :key="emp.id">
                    <button type="button"
                            @click="selectedEmployeeId = emp.id; currentTab = 'employees'; selectedConversationId = null; showHistoryDrawer = false; showProfileDrawer = false"
                            class="w-full flex items-center gap-2.5 px-2 py-2 rounded-xl transition-colors text-left mb-1"
                            :class="selectedEmployeeId === emp.id && (currentTab === 'employees' || currentTab === 'employee-detail') ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-gray-100'"
                            :title="!sidebarOpen ? emp.name + ' · ' + emp.position : ''">
                        <!-- 头像 -->
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-lg"
                             :class="emp.iconBg">
                            <span x-text="emp.avatar"></span>
                        </div>
                        <!-- 名字 + 标识（展开时显示） -->
                        <div class="flex-1 min-w-0" x-show="sidebarOpen">
                            <div class="flex items-center gap-1.5 min-w-0">
                                <span class="text-sm font-medium text-slate-800 flex-shrink-0" x-text="emp.name"></span>
                                <span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-md bg-blue-100 text-blue-600 text-[10px] font-medium flex-shrink-0">默认</span>
                            </div>
                            <p class="text-xs truncate mt-0.5 opacity-50" x-text="getEmployeeVibe(emp)"></p>
                        </div>
                    </button>
                </template>

                <!-- 分隔线 -->
                <div x-show="employeeList.filter(e => e.type !== 'default').length > 0" class="mx-2 my-1.5 h-px bg-gray-100"></div>

                <!-- 其他员工 -->
                <template x-for="emp in filteredEmployees.filter(e => e.type !== 'default')" :key="emp.id">
                    <button type="button"
                            @click="selectedEmployeeId = emp.id; currentTab = 'employees'; selectedConversationId = null; showHistoryDrawer = false; showProfileDrawer = false"
                            class="w-full flex items-center gap-2.5 px-2 py-2 rounded-xl transition-colors text-left mb-0.5"
                            :class="selectedEmployeeId === emp.id && (currentTab === 'employees' || currentTab === 'employee-detail') ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-gray-100'"
                            :title="!sidebarOpen ? emp.name + ' · ' + emp.position : ''">
                        <!-- 头像 -->
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-lg"
                             :class="emp.iconBg">
                            <span x-text="emp.avatar"></span>
                        </div>
                        <!-- 名字 + 岗位 + vibe（展开时显示） -->
                        <div class="flex-1 min-w-0" x-show="sidebarOpen">
                            <div class="flex items-baseline gap-1.5 min-w-0">
                                <span class="text-sm font-medium text-slate-800 flex-shrink-0" x-text="emp.name"></span>
                                <span class="text-xs text-slate-400 truncate" x-text="emp.position"></span>
                                <span x-show="emp.type === 'custom'" class="tag tag-purple flex-shrink-0 text-[10px]">自建</span>
                            </div>
                            <p class="text-xs truncate mt-0.5 opacity-50" x-text="getEmployeeVibe(emp)"></p>
                        </div>
                    </button>
                </template>
                <div x-show="filteredEmployees.filter(e => e.type !== 'default').length === 0 && sidebarOpen && employeeSearch" class="py-4 text-center text-xs text-slate-400">未找到员工</div>
            </div>

            <!-- 新增员工按钮（收起时显示在列表底部） -->
            <div class="px-2 pb-2 flex-shrink-0" x-show="!sidebarOpen">
                <button type="button"
                        @click="showCreateModal = true; createStep = 1; createForm = { name: '', avatar: '🤖', iconBg: 'bg-blue-100', model: 'spark-4', requirements: '', skills: [] }"
                        aria-label="新增员工"
                        class="w-full flex items-center justify-center py-2 rounded-xl text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors">
                    <i data-lucide="user-plus" class="w-4 h-4" aria-hidden="true"></i>
                </button>
            </div>
        </div>

        <!-- 分隔线 -->
        <div class="border-t border-gray-200 mx-3 flex-shrink-0"></div>

        <!-- 底부 导航：日历 / 市场 / 设置 -->
        <div class="px-3 py-3 space-y-0.5 flex-shrink-0">
            <!-- 工作日历 -->
            <button type="button" @click="currentTab = 'calendar'" aria-label="工作日历"
                    class="w-full flex items-center px-3 py-2 text-sm font-medium rounded-xl transition-colors"
                    :class="currentTab === 'calendar' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-gray-100'">
                <i data-lucide="calendar-days" class="w-5 h-5 flex-shrink-0" aria-hidden="true"></i>
                <span class="ml-3 truncate" x-show="sidebarOpen">工作日历</span>
            </button>
            <!-- 员工管理 -->
            <button type="button" @click="currentTab = 'market'" aria-label="员工管理"
                    class="w-full flex items-center px-3 py-2 text-sm font-medium rounded-xl transition-colors"
                    :class="currentTab === 'market' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-gray-100'">
                <i data-lucide="store" class="w-5 h-5 flex-shrink-0" aria-hidden="true"></i>
                <span class="ml-3 truncate" x-show="sidebarOpen">员工管理</span>
            </button>
            <!-- 设置 -->
            <button type="button" @click="currentTab = 'settings'" aria-label="设置"
                    class="w-full flex items-center px-3 py-2 text-sm font-medium rounded-xl transition-colors"
                    :class="currentTab === 'settings' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-gray-100'">
                <i data-lucide="settings" class="w-5 h-5 flex-shrink-0" aria-hidden="true"></i>
                <span class="ml-3 truncate" x-show="sidebarOpen">设置</span>
            </button>
        </div>
    </nav>

    <!-- 用户信息 -->
    <div class="border-t border-gray-200 flex-shrink-0 p-3">
        <div class="flex items-center p-2 rounded-xl hover:bg-gray-100 transition-colors cursor-pointer">
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">王</div>
            <div class="ml-3 overflow-hidden" x-show="sidebarOpen">
                <p class="text-sm font-medium text-slate-700 truncate">王工</p>
                <p class="text-xs text-slate-400">v1.2.0</p>
            </div>
        </div>
    </div>
</aside>

<!-- ===== MAIN CONTENT ===== -->
<main class="flex-1 flex min-h-0 overflow-hidden">

<!-- ===== VIEW: 我的员工 ===== -->
<div x-show="currentTab === 'employees'" class="flex-1 flex overflow-hidden">

    <!-- 右侧对话区 -->
    <div class="flex-1 flex flex-col overflow-hidden relative bg-gray-50">

        <!-- 未选择员工时的提示 -->
        <div x-show="!selectedEmployee" class="flex-1 flex items-center justify-center">
            <div class="text-center">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gray-100 flex items-center justify-center">
                    <i data-lucide="users" class="w-8 h-8 text-slate-300"></i>
                </div>
                <p class="text-slate-500 text-sm">请从左侧选择一位数字员工</p>
            </div>
        </div>

        <!-- 选中员工后的对话区 -->
        <template x-if="selectedEmployee">
            <div class="flex-1 flex flex-col overflow-hidden">

                <!-- 顶部栏（单行紧凑版） -->
                <div class="flex-shrink-0 bg-white border-b border-gray-200 px-4 py-2 flex items-center gap-3">
                    <!-- 左侧：员工信息 + 工牌入口 -->
                    <div class="flex items-center gap-2.5 min-w-0 flex-1">
                        <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0 text-lg"
                             :class="selectedEmployee.iconBg">
                            <span x-text="selectedEmployee.avatar"></span>
                        </div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-1.5">
                                <span class="font-semibold text-slate-800 text-sm truncate" x-text="selectedEmployee.name"></span>
                                <span class="text-slate-300 text-xs">·</span>
                                <span class="text-xs text-slate-400 truncate" x-text="selectedEmployee.position"></span>
                                <!-- 工牌入口 -->
                                <button type="button"
                                        @click="showProfileDrawer = !showProfileDrawer; if(showProfileDrawer) showHistoryDrawer = false"
                                        class="flex-shrink-0 p-0.5 rounded transition-colors"
                                        :class="showProfileDrawer ? 'text-blue-500' : 'text-slate-300 hover:text-slate-500'"
                                        title="员工工牌">
                                    <i data-lucide="id-card" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                            <div class="flex items-center gap-1 mt-0.5">
                                <span class="text-[11px] text-slate-400 truncate" x-text="getEmployeeVibe(selectedEmployee)"></span>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧按钮组 -->
                    <div class="flex items-center gap-1 flex-shrink-0">
                        <!-- 新对话 -->
                        <button type="button"
                                @click="selectedConversationId = null; showHistoryDrawer = false; showProfileDrawer = false"
                                class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg transition-colors text-blue-600 bg-blue-50 hover:bg-blue-100">
                            <i data-lucide="plus" class="w-3.5 h-3.5" aria-hidden="true"></i>
                            <span>新对话</span>
                        </button>
                        <!-- 历史（带浮层） -->
                        <div class="relative" x-data="{ open: false }" @click.outside="open = false">
                            <button type="button"
                                    @click="open = !open; showProfileDrawer = false"
                                    class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg transition-colors"
                                    :class="open ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-gray-100'">
                                <i data-lucide="history" class="w-3.5 h-3.5" aria-hidden="true"></i>
                                <span x-text="selectedConversationId ? (selectedEmployeeConversations.find(c=>c.id===selectedConversationId)?.title || '历史') : '历史'" class="max-w-[100px] truncate"></span>
                                <i data-lucide="chevron-down" class="w-3 h-3 opacity-60" aria-hidden="true"></i>
                            </button>
                            <!-- 历史会话浮层 -->
                            <div x-show="open" x-cloak x-transition
                                 class="absolute right-0 top-full mt-1 w-72 bg-white border border-gray-200 rounded-xl shadow-xl z-50 overflow-hidden slide-in">
                                <div class="px-3 py-2 border-b border-gray-100 flex items-center justify-between">
                                    <span class="text-xs font-semibold text-slate-500">历史对话</span>
                                    <input type="search" x-model="conversationSearch" placeholder="搜索…"
                                           class="text-xs border border-gray-200 rounded-lg px-2 py-1 w-28 focus:ring-1 focus:ring-blue-400 focus:border-transparent">
                                </div>
                                <div class="max-h-64 overflow-y-auto py-1">
                                    <template x-for="conv in selectedEmployeeConversations" :key="conv.id">
                                        <div class="group flex items-center px-3 py-2 mx-1 rounded-lg transition-colors cursor-pointer"
                                             :class="selectedConversationId === conv.id ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-50 text-slate-700'"
                                             @click="selectedConversationId = conv.id; open = false">
                                            <div class="flex-1 min-w-0">
                                                <p class="text-sm font-medium truncate" x-text="conv.title"></p>
                                                <p class="text-xs text-slate-400 mt-0.5" x-text="conv.updatedAt + ' · ' + conv.messageCount + '条'"></p>
                                            </div>
                                            <button type="button" class="p-1 text-slate-300 hover:text-red-500 rounded opacity-0 group-hover:opacity-100 flex-shrink-0" @click.stop="">
                                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                            </button>
                                        </div>
                                    </template>
                                    <div x-show="selectedEmployeeConversations.length === 0" class="py-6 text-center text-xs text-slate-400">暂无对话记录</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 内容区（对话 + 抽屉） -->
                <div class="flex-1 flex overflow-hidden relative">

                    <!-- 对话区 -->
                    <div class="flex-1 flex flex-col overflow-hidden">

                        <!-- 消息区 -->
                        <div class="flex-1 overflow-y-auto py-6 px-4 md:px-8"
                             :class="selectedConversationId !== null ? 'pb-32' : 'pb-8'">
                            <div class="mx-auto max-w-3xl space-y-6">

                                <!-- 欢迎首页（未选对话时） -->
                                <div x-show="selectedConversationId === null"
                                     class="flex flex-col items-center justify-center min-h-[calc(100vh-12rem)] px-4">
                                    <div class="w-full max-w-xl">
                                        <!-- 员工身份 -->
                                        <div class="flex items-center gap-3 mb-5">
                                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm flex-shrink-0 text-2xl"
                                                 :class="selectedEmployee.iconBg">
                                                <span x-text="selectedEmployee.avatar"></span>
                                            </div>
                                            <div>
                                                <h2 class="text-base font-semibold text-slate-800 leading-tight" x-text="selectedEmployee.name"></h2>
                                                <p class="text-xs text-slate-400 mt-0.5" x-text="selectedEmployee.position"></p>
                                            </div>
                                        </div>

                                        <!-- 打招呼 -->
                                        <p class="text-slate-600 text-sm leading-relaxed mb-5 whitespace-pre-line"
                                           x-text="selectedEmployee.greeting || '你好！我是 ' + selectedEmployee.name + '，' + selectedEmployee.bio"></p>

                                        <!-- 默认员工：团队成员入口 -->
                                        <template x-if="selectedEmployee.type === 'default'">
                                            <div class="mb-5">
                                                <p class="text-xs font-medium text-slate-400 mb-2 uppercase tracking-wide">团队成员</p>
                                                <div class="flex items-center gap-2 flex-wrap">
                                                    <template x-for="emp in employeeList.filter(e => e.type !== 'default')" :key="emp.id">
                                                        <button type="button"
                                                                @click="selectedEmployeeId = emp.id; selectedConversationId = null"
                                                                class="flex items-center gap-1.5 px-2.5 py-1.5 bg-white border border-gray-200 rounded-lg hover:border-blue-300 hover:bg-blue-50 transition-all text-left">
                                                            <span class="text-base" x-text="emp.avatar"></span>
                                                            <span class="text-xs font-medium text-slate-700" x-text="emp.name"></span>
                                                            <span class="text-[10px] text-slate-400 truncate max-w-[70px]" x-text="emp.position"></span>
                                                        </button>
                                                    </template>
                                                    <button type="button"
                                                            @click="currentTab = 'market'"
                                                            class="flex items-center gap-1.5 px-2.5 py-1.5 bg-white border border-dashed border-gray-300 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition-all text-slate-400 hover:text-blue-600">
                                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                                        <span class="text-xs">引入更多</span>
                                                    </button>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- 技能卡片 -->
                                        <div class="grid grid-cols-2 gap-2 mb-6">
                                            <template x-for="sc in (selectedEmployee.skillCards || [])" :key="sc.name">
                                                <button type="button"
                                                        @click="chatInput = sc.prompt || sc.name; $nextTick(() => sendMessage())"
                                                        class="flex items-start gap-2.5 p-3 bg-white border border-gray-200 rounded-xl text-left hover:border-blue-300 hover:bg-blue-50 hover:-translate-y-0.5 hover:shadow-md transition-all duration-150 group">
                                                    <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5"
                                                         :class="sc.iconBg || 'bg-slate-100'">
                                                        <i :data-lucide="sc.icon || 'zap'" class="w-3.5 h-3.5" :class="sc.iconColor || 'text-slate-500'" aria-hidden="true"></i>
                                                    </div>
                                                    <div class="min-w-0 flex-1">
                                                        <p class="text-sm font-medium text-slate-700 group-hover:text-blue-700 leading-tight mb-1" x-text="sc.name"></p>
                                                        <p class="text-xs text-slate-400 line-clamp-2 leading-relaxed" x-text="sc.desc"></p>
                                                    </div>
                                                </button>
                                            </template>
                                        </div>

                                        <!-- 输入框 -->
                                        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-md focus-within:shadow-md focus-within:border-blue-400 transition-all relative">
                                            <div class="flex flex-wrap items-baseline gap-2 px-4 pt-4 pb-2 min-h-[2.5rem]">
                                                <template x-if="atMentionedAgent">
                                                    <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full bg-indigo-600 text-white text-sm font-medium">
                                                        <i data-lucide="user" class="w-3.5 h-3.5 text-indigo-200" aria-hidden="true"></i>
                                                        <span x-text="atMentionedAgent.name"></span>
                                                        <button type="button" @click="atMentionedAgent = null" class="p-0.5 rounded-full hover:bg-indigo-500"><i data-lucide="x" class="w-3.5 h-3.5" aria-hidden="true"></i></button>
                                                    </span>
                                                </template>
                                                <textarea x-model="chatInput" rows="3"
                                                    @input="handleAtInput($event)"
                                                    @keydown="handleAtKeydown($event)"
                                                    placeholder="向员工发送指令，输入 @ 调度其他员工…" aria-label="输入指令"

                                    :class="!day ? 'opacity-0 pointer-events-none' :
                                            calendarSelectedDate === day ? 'bg-blue-600 text-white' :
                                            isToday(day) ? 'ring-2 ring-blue-400 text-blue-600' :
                                            'text-slate-700 hover:bg-gray-100'"
                                    x-text="day"></button>
                            <!-- 任务小点 -->
                            <div class="h-1.5 flex items-center justify-center">
                                <div x-show="day && calendarDatesWithTasks.has(day)"
                                     class="w-1 h-1 rounded-full transition-colors"
                                     :class="calendarSelectedDate === day ? 'bg-white/70' : 'bg-blue-400'"></div>
                            </div>
                        </div>
                    </template>
                </div>

                          class="text-[10px] px-1.5 py-0.5 bg-blue-100 text-blue-600 rounded-full font-medium">今天</span>

                    <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-colors"

                        <span x-show="createStep <= step" x-text="step"></span>
                        <i x-show="createStep > step" data-lucide="check" class="w-4 h-4"></i>

                    <span class="text-xs text-slate-400" x-text="['基本信息','描述需求','能力配置'][step-1]"></span>
                    <div x-show="step < 3" class="w-8 h-px bg-gray-200 mx-1"></div>
                </div>
            </template>
        </div>
        <!-- 内容区 -->
        <div class="px-6 py-5">
            <!-- Step 1 -->
            <div x-show="createStep === 1" class="space-y-4">

                    <label class="block text-sm font-medium text-slate-700 mb-1.5">员工姓名 <span class="text-red-500">*</span></label>

                            {emoji:'👨‍💻',bg:'bg-blue-100'},{emoji:'👩‍💻',bg:'bg-blue-100'},{emoji:'🌐',bg:'bg-green-100'},
                            {emoji:'👨‍🎨',bg:'bg-pink-100'},{emoji:'👩‍🎨',bg:'bg-pink-100'},{emoji:'👨‍🔬',bg:'bg-violet-100'},

                            <button type="button"
                                    @click="createForm.avatar = opt.emoji; createForm.iconBg = opt.bg"
                                    class="w-10 h-10 rounded-xl flex items-center justify-center text-xl transition-all"

                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">使用模型</label>
                    <select x-model="createForm.model"
                            class="w-full px-3 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 text-sm">

                <label class="block text-sm font-medium text-slate-700 mb-1.5">描述你的需求</label>
                <p class="text-xs text-slate-400 mb-3">请描述你希望这位员工做什么，AI 将根据描述自动配置员工</p>

                          placeholder="例如：帮我处理日常公文写作，风格要正式、简洁，熟悉政务文书格式，能快速生成会议纪要、工作报告等标准文档..."

            </div>
            <!-- Step 3 -->

                <label class="block text-sm font-medium text-slate-700 mb-3">选择初始技能（可跳过）</label>

                        <label class="flex items-center gap-2.5 p-3 border border-gray-200 rounded-xl cursor-pointer hover:border-blue-300 hover:bg-blue-50/30 transition-colors"
                               :class="createForm.skills.includes(skill) ? 'border-blue-400 bg-blue-50' : ''">
                            <input type="checkbox" :value="skill" x-model="createForm.skills"
                                   class="w-4 h-4 rounded border-gray-300 text-blue-600">
                            <span class="text-sm text-slate-700" x-text="skill"></span>

                    </template>
                </div>
            </div>
            <!-- 创建中动画 -->
            <div x-show="isCreating" class="flex flex-col items-center justify-center py-6 gap-3">
                <div class="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                <p class="text-sm text-slate-500">正在创建数字员工…</p>
            </div>
        </div>
        <!-- 底部操作 -->
        <div class="flex items-center justify-between px-6 py-4 border-t border-gray-100">
            <button type="button" x-show="createStep > 1 && !isCreating"
                    @click="createStep--"
                    class="px-4 py-2 text-sm font-medium text-slate-600 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">

            <div x-show="createStep === 1 || isCreating"></div>
            <div class="flex items-center gap-3">

                        class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">

                        class="px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors disabled:opacity-50"
                        x-text="createStep < 3 ? '下一步 →' : '创建并查看详情'"></button>
            </div>
        </div>
    </div>
</div>

            const offset = firstDay === 0 ? 6 : firstDay - 1;
            const days = [];

                    for (let d = 1; d <= daysInMonth; d++) set.add(d);
                }
            } else {
                // heartbeat 任务：标记当月所有天（持续监测，不分具体日期）
                const daysInMonth = new Date(this.calendarYear, this.calendarMonth, 0).getDate();
                if (filtered.length > 0) {
                    for (let d = 1; d <= daysInMonth; d++) set.add(d);
                }
            }
            return set;
        },
        get selectedDatePlanTasks() {
            if (!this.calendarSelectedDate) return [];
            return this.timedTasks.filter(t => {
                const matchEmp = this.calendarFilterEmployee === 'all' || t.agentId === this.calendarFilterEmployee;
                const matchType = this.calendarTaskTab === 'cron' ? t.type === 'cron' : t.type === 'heartbeat';
                return matchEmp && matchType;
            });
        },

        // 方法
        isToday(day) {
            if (!day) return false;
            const now = new Date();
            return now.getFullYear() === this.calendarYear &&
                   now.getMonth() + 1 === this.calendarMonth &&
                   now.getDate() === day;
        },
        getWorkspacePath(emp) {
            if (!emp) return '';
            if (emp.workspace) return emp.workspace;
            return 'C:\\Users\\wfouyang\\AIOS\\workspace\\' + emp.id;
        },
        openWorkspace(emp) {
            if (!emp) return;
            const path = this.getWorkspacePath(emp);
            // 在原型中弹出 toast 提示；实际产品中可用 shell.openPath(path)
            this.showToastMsg('📂 打开文件夹：' + path);
        },
        showToastMsg(msg) {
            this.toastMessage = msg;
            this.showToast = true;
            setTimeout(() => { this.showToast = false; }, 2500);
        },
        getEmployeeVibe(emp) {
            if (!emp) return '';
            const now = Date.now();
            const diff = now - (emp.lastActiveTime || 0);
            return diff < 1000 * 60 * 60 ? emp.vibe : emp.vibeIdle;
        },
        goToDetail(employeeId) {
            this.detailEmployeeId = employeeId;
            this.detailTab = 'overview';
            this.detailEditMode = {};
            const emp = this.employeeList.find(e => e.id === employeeId);
            if (emp) {
                this.detailIdentityName = emp.name;
                this.detailIdentityPosition = emp.position;
                this.detailIdentityBio = emp.bio;
                this.agentsQuickEdit = { ...(emp.agentsQuickEdit || { duties: '', prohibitions: '', outputRules: '' }) };
                this.soulSliders = { ...(emp.soulSliders || { tone: 50, detail: 50, creativity: 50 }) };
                this.heartbeatTasks = (emp.heartbeatTasks || []).map(t => ({ ...t }));
                this.fileContents = {
                    '基本信息': `# 身份定义\n\n## 基础信息\n- name: ${emp.name}\n- position: ${emp.position}\n\n## 风格气质\n- style: ${emp.position}\n\n## 个人简介\n${emp.bio}`,
                    '工作守则': `# 工作守则\n\n## 核心职责\n${emp.agentsQuickEdit?.duties || ''}\n\n## 禁止事项\n${emp.agentsQuickEdit?.prohibitions || ''}\n\n## 输出规范\n${emp.agentsQuickEdit?.outputRules || ''}`,
                    '性格特质': `# 性格特质\n\n## 语气风格\n- tone: ${emp.soulSliders?.tone || 50}  # 0=严肃正式, 100=活泼幽默\n\n## 表达详度\n- detail: ${emp.soulSliders?.detail || 50}  # 0=简洁, 100=详尽\n\n## 创意程度\n- creativity: ${emp.soulSliders?.creativity || 50}  # 0=保守, 100=创新`,
                    '老板画像': `# 用户画像\n\n## 基本信息\n${emp.userMd || '（暂无数据）'}`,
                    '长期记忆': `# 长期记忆\n\n${(emp.memoryItems || []).map(item => `- ${item}`).join('\n') || '（暂无记忆条目）'}`,
                    '自我介绍': `我是${emp.name}，${emp.position}。${emp.bio}`,
                    '日程巡检': (emp.heartbeatTasks || []).map(t => `- [${t.enabled ? 'x' : ' '}] ${t.time} ${t.description}`).join('\n') || '',
                };
            }
            this.currentTab = 'employee-detail';
        },
        toggleEditMode(cardName) {
            const current = this.detailEditMode[cardName];
            this.detailEditMode = { ...this.detailEditMode, [cardName]: current === 'advanced' ? 'quick' : 'advanced' };
        },
        saveDetail() {
            const emp = this.detailEmployee;
            if (!emp) return;
            emp.name = this.detailIdentityName;
            emp.position = this.detailIdentityPosition;
            emp.bio = this.detailIdentityBio;
            emp.agentsQuickEdit = { ...this.agentsQuickEdit };
            emp.soulSliders = { ...this.soulSliders };
            emp.heartbeatTasks = this.heartbeatTasks.map(t => ({ ...t }));
            this.showToastMsg('员工配置已保存 ✓');
        },
        addHeartbeatTask() {
            this.heartbeatTasks.push({ enabled: true, time: '09:00', description: '新任务描述' });
        },
        removeHeartbeatTask(idx) {
            this.heartbeatTasks.splice(idx, 1);
        },
        sendMessage() {
            if (!this.chatInput.trim() && !this.atMentionedAgent) return;
            if (this.selectedConversationId === null) {
                const newConv = {
                    id: Date.now(),
                    title: this.chatInput.slice(0, 20) || '新对话',
                    updatedAt: '刚刚',
                    messageCount: 1,
                    duration: '0分钟'
                };
                if (this.selectedEmployee) {
                    if (!this.selectedEmployee.conversations) this.selectedEmployee.conversations = [];
                    this.selectedEmployee.conversations.unshift(newConv);
                    this.selectedConversationId = newConv.id;
                }
            }
            this.chatInput = '';
            this.atMentionedAgent = null;
            this.showAtPanel = false;
        },
        handleAtInput(event) {
            const val = event.target.value;
            const atIdx = val.lastIndexOf('@');
            if (atIdx !== -1) {
                this.atSearch = val.slice(atIdx + 1);
                this.showAtPanel = true;
                this.atSelectedIdx = 0;
            } else {
                this.showAtPanel = false;
            }
        },
        handleAtKeydown(event) {
            if (!this.showAtPanel) return;
            if (event.key === 'ArrowDown') { event.preventDefault(); this.atSelectedIdx = Math.min(this.atSelectedIdx + 1, this.atFilteredAgents.length - 1); }
            if (event.key === 'ArrowUp') { event.preventDefault(); this.atSelectedIdx = Math.max(this.atSelectedIdx - 1, 0); }
            if (event.key === 'Enter' && this.atFilteredAgents[this.atSelectedIdx]) { event.preventDefault(); this.selectAtAgent(this.atFilteredAgents[this.atSelectedIdx]); }
            if (event.key === 'Escape') { this.showAtPanel = false; }
        },
        selectAtAgent(agent) {
            this.atMentionedAgent = agent;
            const atIdx = this.chatInput.lastIndexOf('@');
            if (atIdx !== -1) this.chatInput = this.chatInput.slice(0, atIdx);
            this.showAtPanel = false;
            this.atSearch = '';
        },
        importEmployee(id) {
            const emp = this.employeeList.find(e => e.id === id);
            if (emp) {
                emp.imported = true;
                this.showToastMsg('已引入 ' + emp.name + ' ✓');
            }
        },
        createEmployee() {
            if (this.isCreating) return;
            if (this.createStep === 1) {
                if (!this.createForm.name.trim()) { this.showToastMsg('请填写员工姓名'); return; }
                this.createStep = 2;
                return;
            }
            if (this.createStep === 2) {
                this.createStep = 3;
                return;
            }
            // Step 3: 创建
            this.isCreating = true;
            setTimeout(() => {
                const newEmp = {
                    id: 'emp-' + Date.now(),
                    name: this.createForm.name,
                    type: 'custom',
                    position: 'AI助手',
                    bio: this.createForm.requirements || '正在初始化中...',
                    model: this.createForm.model,
                    avatar: this.createForm.avatar || '🤖',
                    icon: 'user',
                    iconBg: this.createForm.iconBg || 'bg-blue-100',
                    iconColor: 'text-slate-600',
                    imported: true,
                    callCount: '0',
                    totalConversations: 0,
                    monthlyConversations: 0,
                    avgResponseTime: '—',
                    satisfaction: '—',
                    skills: this.createForm.skills.slice(),
                    tools: [],
                    category: '效率',
                    lastActiveTime: Date.now(),
                    joinDate: new Date().toISOString().slice(0, 10),
                    vibe: '⚡ 随时待命',
                    vibeIdle: '💤 待机中',
                    agentsQuickEdit: { duties: this.createForm.requirements, prohibitions: '', outputRules: '' },
                    soulSliders: { tone: 50, detail: 50, creativity: 50 },
                    userMd: '',
                    memoryItems: [],
                    heartbeatTasks: [],
                    conversations: [],
                };
                this.employeeList.unshift(newEmp);
                this.isCreating = false;
                this.showCreateModal = false;
                this.createStep = 1;
                this.createForm = { name: '', avatar: '🤖', iconBg: 'bg-blue-100', model: 'spark-4', requirements: '', skills: [] };
                this.goToDetail(newEmp.id);
                this.showToastMsg('🎉 员工「' + newEmp.name + '」已创建！');
            }, 1500);
        },
    };
}

document.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') lucide.createIcons();
});
</script>
